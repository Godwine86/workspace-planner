name: Generate Repository Map
on:
  push:
    branches: [ main, master ]

jobs:
  build-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Structure Map
        run: |
          mkdir -p graphify-out
          echo "# Codebase Structure Map" > graphify-out/GRAPH_REPORT.md
          echo "Generated on: $(date)" >> graphify-out/GRAPH_REPORT.md
          echo -e "\n## File Tree\n\`\`\`text" >> graphify-out/GRAPH_REPORT.md
          
          # This lists all files while ignoring heavy hidden folders like .git
          find . -maxdepth 4 -not -path '*/.*' >> graphify-out/GRAPH_REPORT.md
          
          echo -e "\`\`\`" >> graphify-out/GRAPH_REPORT.md

      - name: Commit and Push Map
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add graphify-out/
          git commit -m "chore: update codebase map [skip ci]" || echo "No changes"
          git push
